<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Vantage — Nepal News Intelligence</title>
    <!-- Using system fonts via src/index.css; removed Google Fonts to normalize typography -->
    <script>
      (function () {
        try {
          var storageKey = 'vantage-theme'
          var theme = window.localStorage.getItem(storageKey) || 'system'
          var systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
          var resolvedTheme = theme === 'system' ? systemTheme : theme
          var root = document.documentElement
          root.dataset.theme = resolvedTheme
          root.style.colorScheme = resolvedTheme
        } catch (error) {
          document.documentElement.dataset.theme = 'light'
          document.documentElement.style.colorScheme = 'light'
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <meta name="description" content="Vantage is an AI-powered news intelligence platform for Nepali publishers, events, sentiment and media analysis." />
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
